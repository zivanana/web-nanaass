<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D'ANS — Profile</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Login Screen -->
    <div class="login-screen" id="loginScreen">
        <div class="login-card">
            <div class="login-avatar"><img src="pp tulip.jpeg" alt="Avatar"></div>
            <h1 class="login-brand">D'ANS</h1>
            <form id="loginForm">
                <div class="form-group"><input type="email" id="loginEmail" placeholder="Email" required></div>
                <div class="form-group"><input type="password" id="loginPassword" placeholder="Kata Sandi" required></div>
                <button type="submit" class="btn-login">Masuk →</button>
            </form>
            <p class="login-hint">Email: user@example.com | Pass: 123</p>
        </div>
    </div>

    <!-- App utama -->
    <div class="app hidden" id="app">
        <!-- Sidebar, topbar, dan konten halaman (Home, Dashboard, Artikel, Location, Contact) -->
        <!-- Sama seperti sebelumnya, tapi semua data diambil dari backend -->
    </div>

    <script src="script.js"></script>
</body>
</html>
